# ============================================================
# docker-compose.yml — 本地开发 & 测试环境
# ============================================================
# 启动：docker compose up -d
# 仅数据库：docker compose up -d db redis

version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xuexi-backend
    ports:
      - '${PORT:-8080}:8080'
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8080
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-xuexi}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-xuexi123456}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - xuexi-net
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: xuexi-db
    environment:
      - POSTGRES_DB=${DB_NAME:-xuexi}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-xuexi123456}
      - TZ=Asia/Shanghai
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docs/database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - '5432:5432'
    networks:
      - xuexi-net
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-xuexi}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xuexi-redis
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    networks:
      - xuexi-net
    restart: unless-stopped
    profiles:
      - full

volumes:
  pg_data:
  redis_data:

networks:
  xuexi-net:
    driver: bridge